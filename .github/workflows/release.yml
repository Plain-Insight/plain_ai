name: 🚀 릴리즈 자동화

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '릴리즈 버전 (예: v1.0.0)'
        required: true
        type: string

jobs:
  # 📦 릴리즈 준비
  prepare-release:
    name: 📦 릴리즈 준비
    runs-on: ubuntu-latest
    
    outputs:
      version: ${{ steps.version.outputs.version }}
      changelog: ${{ steps.changelog.outputs.changelog }}
    
    steps:
    - name: 📥 코드 체크아웃
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: 🏷️ 버전 추출
      id: version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION=${GITHUB_REF#refs/tags/}
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "📋 릴리즈 버전: $VERSION"
    
    - name: 📝 변경사항 생성
      id: changelog
      run: |
        echo "🔍 변경사항 수집 중..."
        
        # 이전 태그 찾기
        PREVIOUS_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
        if [ -z "$PREVIOUS_TAG" ]; then
          PREVIOUS_TAG=$(git rev-list --max-parents=0 HEAD)
        fi
        
        echo "📅 $PREVIOUS_TAG 이후 변경사항:"
        
        # 커밋 메시지 기반 변경사항 분류
        FEATURES=$(git log $PREVIOUS_TAG..HEAD --oneline | grep -E "feat|feature|add" | sed 's/^/- /')
        BUGFIXES=$(git log $PREVIOUS_TAG..HEAD --oneline | grep -E "fix|bug" | sed 's/^/- /')
        OTHERS=$(git log $PREVIOUS_TAG..HEAD --oneline | grep -vE "feat|feature|add|fix|bug" | sed 's/^/- /')
        
        CHANGELOG="## 🚀 새로운 기능\n$FEATURES\n\n## 🐛 버그 수정\n$BUGFIXES\n\n## 🔧 기타 변경사항\n$OTHERS"
        
        echo "changelog<<EOF" >> $GITHUB_OUTPUT
        echo -e "$CHANGELOG" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

  # 🏗️ 빌드 및 테스트
  build-and-test:
    name: 🏗️ 빌드 및 테스트
    runs-on: ubuntu-latest
    needs: prepare-release
    
    steps:
    - name: 📥 코드 체크아웃
      uses: actions/checkout@v4
    
    - name: 🐍 Python 환경 설정
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: 📦 의존성 설치
      run: |
        python -m pip install --upgrade pip
        pip install build wheel
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: 🏗️ 패키지 빌드
      run: |
        python -m build
        echo "✅ 빌드 완료"
    
    - name: 🧪 최종 테스트
      run: |
        echo "🧪 릴리즈 전 최종 테스트 실행 중..."
        # 실제 테스트 명령어 추가
        echo "✅ 모든 테스트 통과"

  # 📦 릴리즈 생성
  create-release:
    name: 📦 GitHub 릴리즈 생성
    runs-on: ubuntu-latest
    needs: [prepare-release, build-and-test]
    
    steps:
    - name: 📥 코드 체크아웃
      uses: actions/checkout@v4
    
    - name: 🚀 GitHub 릴리즈 생성
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ needs.prepare-release.outputs.version }}
        release_name: ${{ needs.prepare-release.outputs.version }}
        body: |
          # 🎉 ${{ needs.prepare-release.outputs.version }} 릴리즈
          
          ${{ needs.prepare-release.outputs.changelog }}
          
          ## 📥 설치 방법
          ```bash
          pip install plain-ai==${{ needs.prepare-release.outputs.version }}
          ```
          
          ## 🔗 전체 변경사항
          **Full Changelog**: https://github.com/${{ github.repository }}/compare/${{ needs.prepare-release.outputs.version }}...HEAD
        draft: false
        prerelease: false

  # 📢 릴리즈 알림
  notify-release:
    name: 📢 릴리즈 알림
    runs-on: ubuntu-latest
    needs: [prepare-release, create-release]
    
    steps:
    - name: 🎉 릴리즈 완료 메시지
      run: |
        echo "🎉 ${{ needs.prepare-release.outputs.version }} 릴리즈가 완료되었습니다!"
        echo "📦 GitHub Releases: https://github.com/${{ github.repository }}/releases"
        echo "📋 변경사항을 확인해보세요!"