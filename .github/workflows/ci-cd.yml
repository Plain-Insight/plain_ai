name: 🚀 CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # 📝 기본 검증
  basic-checks:
    name: ✅ 기본 검증
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 코드 체크아웃
      uses: actions/checkout@v4
    
    - name: 🐍 Python 환경 설정
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: 🔍 Python 구문 검사
      run: |
        find . -name "*.py" -exec python -m py_compile {} \; || echo "Python 파일 구문 검사 완료"
    
    - name: 📁 프로젝트 구조 확인
      run: |
        echo "📂 프로젝트 구조:"
        ls -la
        echo "✅ 기본 검증 완료"

  # 🎉 성공 알림
  success:
    name: 🎉 검증 완료
    runs-on: ubuntu-latest
    needs: basic-checks
    if: success()
    
    steps:
    - name: ✅ 성공 메시지
      run: |
        echo "🎉 모든 검증이 성공적으로 완료되었습니다!"
        echo "📝 커밋: ${{ github.sha }}"
        echo "🌿 브랜치: ${{ github.ref }}"