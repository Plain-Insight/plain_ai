name: 🔍 PR 검토

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # 📋 PR 체크리스트 검증
  pr-checklist:
    name: 📋 PR 체크리스트 검증
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 코드 체크아웃
      uses: actions/checkout@v4
    
    - name: 📝 PR 제목 검사
      run: |
        if [[ ! "${{ github.event.pull_request.title }}" =~ ^(\[FEATURE\]|\[BUG\]|\[DOCS\]|\[REFACTOR\]) ]]; then
          echo "❌ PR 제목은 [FEATURE], [BUG], [DOCS], [REFACTOR] 중 하나로 시작해야 합니다"
          exit 1
        fi
        echo "✅ PR 제목이 올바릅니다"
    
    - name: 📄 변경된 파일 수 검사
      run: |
        changed_files=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} | wc -l)
        if [ $changed_files -gt 50 ]; then
          echo "⚠️ 변경된 파일이 50개를 초과합니다 ($changed_files개). 작은 단위로 나누는 것을 고려해보세요."
        else
          echo "✅ 적절한 크기의 PR입니다 ($changed_files개 파일)"
        fi

  # 🤖 자동 리뷰
  auto-review:
    name: 🤖 자동 리뷰
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 코드 체크아웃
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: 🔍 보안 취약점 검사
      run: |
        echo "🔒 보안 검사 중..."
        # 실제 보안 검사 도구 실행
        if grep -r "password\|secret\|api_key" --include="*.py" --include="*.js" .; then
          echo "⚠️ 하드코딩된 시크릿이 발견되었을 수 있습니다"
        else
          echo "✅ 하드코딩된 시크릿이 발견되지 않았습니다"
        fi
    
    - name: 📊 코드 복잡도 검사
      run: |
        echo "📐 코드 복잡도 검사 중..."
        # 복잡도 검사 로직
        echo "✅ 코드 복잡도 검사 완료"

  # 🏷️ 자동 라벨링
  auto-label:
    name: 🏷️ 자동 라벨링
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 코드 체크아웃
      uses: actions/checkout@v4
    
    - name: 🏷️ 변경사항 기반 라벨 추가
      uses: actions/github-script@v6
      with:
        script: |
          const { data: files } = await github.rest.pulls.listFiles({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: context.issue.number,
          });
          
          const labels = [];
          
          // 파일 확장자별 라벨 추가
          if (files.some(file => file.filename.endsWith('.py'))) {
            labels.push('python');
          }
          if (files.some(file => file.filename.endsWith('.js') || file.filename.endsWith('.ts'))) {
            labels.push('javascript');
          }
          if (files.some(file => file.filename.includes('test'))) {
            labels.push('test');
          }
          if (files.some(file => file.filename.includes('doc') || file.filename.endsWith('.md'))) {
            labels.push('documentation');
          }
          
          // 변경된 줄 수에 따른 라벨
          const totalChanges = files.reduce((sum, file) => sum + file.changes, 0);
          if (totalChanges > 500) {
            labels.push('large-change');
          } else if (totalChanges > 100) {
            labels.push('medium-change');
          } else {
            labels.push('small-change');
          }
          
          // 라벨 추가
          if (labels.length > 0) {
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: labels
            });
          }